# Skill Loader 配置
# 修改后使用 /skill reload 或重启 bot 生效

[skill_loader]
enabled = true
skills_dir = "skills"
default_model = ""           # 留空使用系统默认模型，填写 model_config.toml 中的模型 name
default_max_turns = 10       # agent 模式默认最大轮数
timeout_seconds = 60         # skill 执行超时（秒）
agent_max_context_tokens = 8000  # agent 上下文 token 预算

[capabilities]
allow_bash = false           # 允许执行 shell 命令
allow_python = false         # 允许执行 Python 代码
allow_read_file = true       # 允许读取文件
allow_write_file = false     # 允许写入文件
allow_http = true            # 允许 HTTP 请求

bash_working_dir = ""        # bash 工作目录（空=插件目录）
bash_timeout = 30            # bash 命令超时（秒）
bash_blocked_commands = ["rm -rf /", "mkfs", "dd if=", "shutdown", "reboot"]

read_file_allowed_dirs = []  # 读取目录白名单（空=不限）
write_file_allowed_dirs = [] # 写入目录白名单（空=不限）
write_file_max_size_kb = 1024

http_allowed_domains = []    # HTTP 域名白名单（空=不限）
http_timeout = 30
